apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: certificatsurvey-ingress
  namespace: certificatsurvey
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.tls.certresolver: "myresolver"
spec:
  tls:
    - hosts:
        - certificatsurvey.vexaaiplus.com
  rules:
    - host: certificatsurvey.vexaaiplus.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3001
